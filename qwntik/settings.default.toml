_version = 1

# dev-token: single static token for headless LibreFang→Fabro API access.
# The token value is read from FABRO_DEV_TOKEN env var at runtime.
[server.auth]
methods = ["dev-token"]

# ccflare: Qwntik's Claude Code OAuth load-balancer on Hetzner.
# Fabro appends /messages; ccflare strips /v1/claude-code and forwards /v1/messages.
# The trailing /v1 in base_url is required for ccflare's routing format.
[llm.providers.ccflare]
display_name = "ccflare (Qwntik Claude Router)"
adapter = "anthropic"
base_url = "http://ccflare:8080/v1/claude-code/v1"

[llm.providers.ccflare.auth]
credentials = ["env:ANTHROPIC_API_KEY"]

# Default all runs to Sonnet via ccflare.
# Opus triggers rolling rate limits on ccflare accounts; Sonnet clears reliably.
[run.model]
name     = "claude-sonnet-4-6"
provider = "ccflare"

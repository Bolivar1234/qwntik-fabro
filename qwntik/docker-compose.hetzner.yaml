# Hetzner deployment for qwntik-fabro.
#
# Usage:
#   docker compose -f qwntik/docker-compose.hetzner.yaml up -d
#
# Requires:
#   - ANTHROPIC_API_KEY, FABRO_DEV_TOKEN, SESSION_SECRET in .env
#   - daxiom compose project running (provides daxiom_default network + ccflare)
#
# Fabro is reachable:
#   - From host:                http://127.0.0.1:7788
#   - From daxiom containers:   http://fabro:32276  (alias on daxiom_default)

services:
  qwntik-fabro:
    image: ghcr.io/bolivar1234/qwntik-fabro:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7788:32276"
    networks:
      - default
      - daxiom_default
    volumes:
      - qwntik-fabro-storage:/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Token format: fabro_dev_ + 64 hex chars.
      # Generate: echo "fabro_dev_$(openssl rand -hex 32)"
      FABRO_DEV_TOKEN: "${FABRO_DEV_TOKEN}"
      # Required when server.auth.methods is set.
      # Generate: openssl rand -hex 32
      SESSION_SECRET: "${SESSION_SECRET}"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:32276/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  qwntik-fabro-storage:

networks:
  default: {}
  daxiom_default:
    external: true
